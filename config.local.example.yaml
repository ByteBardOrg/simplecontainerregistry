http:
  address: "0.0.0.0"
  port: 5000

storage:
  rootDirectory: "data/registry"
  commit: true
  gc: true
  gcDelay: "1h"
  gcInterval: "24h"

database:
  driver: "sqlite"
  dsn: "data/scr.db"

auth:
  issuer: "scr"
  service: "scr"
  tokenTTL: "10m"

